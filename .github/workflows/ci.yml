name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # Verification only (syntax, config, imports). Full Xcode build requires
  # macOS 26 + Xcode 26 which is not yet available on GitHub-hosted runners.
  verify:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Run verification
        run: bash scripts/demo.sh

      - name: Run unit tests
        run: python3 -m unittest test_model -v
